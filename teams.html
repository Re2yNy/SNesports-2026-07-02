            'DRX': { fullName: 'DRX', region: 'Pacific Region', history: '한국의 전통 강호로 일관된 전술과 뛰어난 교전 조율을 자랑하는 글로벌 베테랑입니다.', years: [], dbKeys: [], roster: ['stax', 'Buzz', 'MaKo', 'Foxy9', 'Flashback'], form: ['l', 'w', 'l', 'w', 'w'] },
            'RRQ': { fullName: 'Rex Regum Qeon', region: 'Pacific Region', history: '성공적인 빌드업을 통해 강팀들을 상대로 날카로운 업셋을 수시로 꽂아 넣는 복병입니다.', years: ['2026'], dbKeys: ['rrq_2026'], roster: ['flrrr', 'LJG', 'Estrella', 'Jemkin', 'Monyet'], form: ['w', 'w', 'l', 'l', 'w'] },
            'PRX': { fullName: 'Paper Rex', region: 'Pacific Region', history: '초공격적인 기동 전술로 글로벌 팬덤을 휘어잡은 스타 팀입니다.', years: [], dbKeys: [], roster: ['f0rsakeN', 'mindfreak', 'd4v41', 'something', 'Jinggg'], form: ['w', 'l', 'w', 'l', 'w'] },
            'EDG': { fullName: 'EDward Gaming', region: 'CN Region', history: '중국 리그를 선도하며 글로벌 토너먼트 때마다 압도적인 고점을 뿜어내는 명가입니다.', years: ['2026', '2025'], dbKeys: ['edg_2026', 'edg_2025'], roster: ['ZmjjKK', 'CHICHOO', 'nobody', 'Smoggy', 'S1Mon'], form: ['l', 'w', 'w', 'l', 'l'] },
            'G2': { fullName: 'G2 Esports', region: 'Americas Region', history: '국제 대회 경험을 토대로 결정적인 무대에서 체급을 증명해 내는 구단입니다.', years: ['2025'], dbKeys: ['g2_2025'], roster: ['Snax', 'huNter-', 'leaf', 'trent', 'malbsMd'], form: ['w', 'w', 'l', 'l', 'w'] },
            'FNC': { fullName: 'Fnatic', region: 'EMEA Region', history: '정교한 전술적 움직임과 끈끈한 팀워크로 유럽 무대를 호령하는 명문 강호입니다.', years: ['2025'], dbKeys: ['fnc_2025'], roster: ['Boaster', 'Chronicle', 'Alfajer', 'Derke', 'Hiro'], form: ['l', 'w', 'w', 'l', 'w'] },
            'T1': { fullName: 'T1', region: 'Pacific Region', history: 'SN Asian Championship에서 눈부신 준우승 달성.', years: [], dbKeys: [], roster: ['Sayaplayer', 'Carpe', 'Rossy', 'iZu', 'xccurate'], form: ['l', 'w', 'w', 'w', 'l'] },
            'BOOM': { fullName: 'BOOM Esports', region: 'Pacific Region', history: '신성 dos9의 합류로 완벽한 세대교체 성공.', years: [], dbKeys: [], roster: ['Famouz', 'dos9', 'NcSled', 'BerserX', 'Zells'], form: ['w', 'l', 'w', 'w', 'l'] },
            'LOUD': { fullName: 'LOUD', region: 'Americas Region', history: '남미 최고의 전술 집중력과 화끈한 교전 화력을 자랑하는 브라질의 자존심입니다.', years: ['2025', '2024'], dbKeys: ['loud_2025', 'loud_2024'], roster: ['Less', 'Saadhak', 'Cauanzin', 'Tuyz', 'pANADA'], form: ['l', 'w', 'w', 'l', 'w'] }
        };

        // 이하 loadTeamProfile, selectYearAward, showEmptyTemplate 스크립트는 이전 수정본과 완벽 일치 유지
        function loadTeamProfile(teamKey, btnElement) {
            const data = detailedTeamDB[teamKey];
            if (!data) return;

            const buttons = document.querySelectorAll('.team-list-btn');
            buttons.forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            let formHTML = '';
            data.form.forEach(res => {
                if(res === 'w') formHTML += `<div class="form-badge form-w">W</div>`;
                else formHTML += `<div class="form-badge form-l">L</div>`;
            });

            let rosterHTML = '';
            data.roster.forEach(player => {
                let boldStyle = player === 'zmjjHK' || player === 'Aleksib' ? ' style="font-weight:bold; color:#1d4ed8;"' : '';
                rosterHTML += `<li${boldStyle}>${player}</li>`;
            });

            let yearsHTML = '';
            if (data.years && data.years.length > 0) {
                data.years.forEach((yr, idx) => {
                    yearsHTML += `<button class="year-tab-btn" onclick="selectYearAward('${data.dbKeys[idx]}', this)">${yr}</button>`;
                });
            } else {
                yearsHTML = `<div class="history-text" style="color:#64748b;">우승 타이틀 기록이 아직 입력되지 않았습니다.</div>`;
            }

            document.getElementById('profileMainBox').innerHTML = `
                <div class="profile-header">
                    <img src="32위 팀 로고/${teamKey}.png" class="profile-logo" alt="${teamKey}">
                    <div class="profile-title-box">
                        <h2>${data.fullName}</h2>
                        <span class="region-badge">${data.region}</span>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-block">
                        <h4 class="block-title">🏆 역대 우승 타이틀</h4>
                        <div class="years-container">${yearsHTML}</div>
                    </div>
                    <div class="info-block">
                        <h4 class="block-title">📈 최근 5경기 전적 (Form)</h4>
                        <div class="form-wrapper">${formHTML}</div>
                    </div>
                </div>

                <div id="champDetailBox" class="detail-award-box"></div>

                <div class="info-grid" style="margin-top: 25px;">
                    <div class="info-block">
                        <h4 class="block-title">👥 소속 Active Roster</h4>
                        <ul class="roster-list">${rosterHTML}</ul>
                    </div>
                    <div class="info-block">
                        <h4 class="block-title">📝 팀 프로필 및 히스토리</h4>
                        <p class="history-text">${data.history}</p>
                    </div>
                </div>
            `;
        }

        function selectYearAward(dbKey, btnElement) {
            const yButtons = document.querySelectorAll('.year-tab-btn');
            yButtons.forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            const awardsList = championshipAwardsDB[dbKey];
            const detailBox = document.getElementById('champDetailBox');
            
            if (!awardsList || awardsList.length === 0) {
                detailBox.style.display = 'block';
                detailBox.innerHTML = `<div class="detail-award-title">🥇 우승 대회 세부 내역</div><div style="font-size:13px; color:#64748b;">데이터 준비 중입니다.</div>`;
                return;
            }

            detailBox.style.display = 'block';
            let finalHTML = `<div class="detail-award-title">🥇 우승 대회 세부 내역 (아카이브)</div>`;

            awardsList.forEach((award, idx) => {
                let divider = idx > 0 ? ' class="multiple-champs-divider"' : '';
                finalHTML += `
                    <div${divider}>
                        <div style="font-weight:bold; font-size:14px; color:#b45309; margin-bottom:8px;">🎯 ${award.title}</div>
                        <table class="detail-table">
                            <tr><td class="label-td">대회 일정</td><td>${award.date}</td></tr>
                            <tr><td class="label-td">상금 총합</td><td><strong>${award.prize}</strong></td></tr>
                            <tr><td class="label-td">결승 상대</td><td>${award.opponent}</td></tr>
                            <tr><td class="label-td">최종 스코어</td><td><span style="font-family:monospace; font-weight:bold; background:#fef08a; padding:1px 6px; border-radius:3px;">${award.score}</span></td></tr>
                            <tr><td class="label-td">대회 MVP</td><td style="color:#b45309; font-weight:500;">${award.mvp}</td></tr>
                        </table>
                    </div>
                `;
            });

            detailBox.innerHTML = finalHTML;
        }

        function showEmptyTemplate(teamKey) {
            const buttons = document.querySelectorAll('.team-list-btn');
            buttons.forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            document.getElementById('profileMainBox').innerHTML = `
                <div class="profile-header">
                    <img src="32위 팀 로고/${teamKey}.png" class="profile-logo" alt="${teamKey}">
                    <div class="profile-title-box">
                        <h2>${teamKey} Esports</h2>
                        <span class="region-badge">대기 구역 (TBD)</span>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-block">
                        <h4 class="block-title">🏆 역대 우승 타이틀</h4>
                        <div class="history-text">- 우승 내역 입력 대기 -</div>
                    </div>
                    <div class="info-block">
                        <h4 class="block-title">📈 최근 5경기 전적 (Form)</h4>
                        <div class="form-wrapper">
                            <div class="form-badge form-tbd">?</div>
                            <div class="form-badge form-tbd">?</div>
                            <div class="form-badge form-tbd">?</div>
                        </div>
                    </div>
                </div>
                <div class="info-block">
                    <h4 class="block-title">📝 안내</h4>
                    <p class="history-text">해당 팀의 연도별 우승 정보와 상세 대회 스펙 데이터를 대기 중입니다.</p>
                </div>
            `;
        }

        window.onload = function() {
            loadTeamProfile('GEN', document.querySelector('.team-list-btn.active'));
        };
    </script>
</body>
</html>
